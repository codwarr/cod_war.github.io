<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>اخبار</title>

<style>
@font-face {
    font-family: 'myfont';
    src: url('font.ttf');
}

body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: 'myfont';
    color: #e8c98a;
}

.box {
    width: 90%;
    margin: 20px auto;
    padding: 20px;
    background: #1a140a;
    border: 3px solid #c9b06a;
    border-radius: 14px;
}
</style>
</head>

<body>

<h1 style="text-align:center; font-size:40px;">اخبار 📝</h1>

<div id="news-container"></div>

<script>
fetch("news-data.txt")
    .then(res => res.text())
    .then(data => {
        let lines = data.split("\n");
        let html = "";

        lines.forEach(line => {
            if (line.trim() !== "") {
                let p = line.split("|");

                html += `
                    <div class="box">
                        <h2>${p[0]}</h2>
                        ${p[1] !== "none" ? `<p>${p[1]}</p>` : ""}
                        ${p[2] !== "none" ? `<img src="${p[2]}" style="width:100%; border-radius:10px;">` : ""}
                        ${p[3] !== "none" ? `<video controls style="width:100%; border-radius:10px;"><source src="${p[3]}"></video>` : ""}
                    </div>
                `;
            }
        });

        document.getElementById("news-container").innerHTML = html;
    });
</script>

</body>
</html>
