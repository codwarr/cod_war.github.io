<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Main</title>

<style>
@font-face {
    font-family: 'myfont';
    src: url('font.ttf');
}

body {
    margin: 0;
    padding: 0;
    background: #000;
    font-family: 'myfont';
    color: #e8c98a;
}

.music-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    width: 45px;
    height: 45px;
    background: #000000aa;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e0c27a;
    font-size: 22px;
    cursor: pointer;
    z-index: 9999;
}

iframe#pageFrame {
    width: 100%;
    height: 100vh;
    border: none;
}
</style>
</head>

<body>

<iframe src="music.html" id="musicFrame" style="display:none;"></iframe>

<div class="music-btn" onclick="toggleMusic()">🔊</div>

<script>
function toggleMusic() {
    document.getElementById("musicFrame").contentWindow.postMessage("toggleMusic", "*");
}

window.addEventListener("message", (e) => {
    if (e.data === "toggleMusic") {
        document.getElementById("musicFrame").contentWindow.postMessage("toggleMusic", "*");
    }
});
</script>

<iframe id="pageFrame" src="index.html"></iframe>

</body>
</html>
