<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>اتچمنت‌ها ⚔️</title>

<style>
@font-face {
    font-family: 'myfont';
    src: url('font.ttf');
}

body {
    margin: 0;
    padding: 0;
    background: #0a0a0a;
    font-family: 'myfont';
    color: #f5e4b0;
}

/* کارت باستانی خفن */
.box {
    width: 92%;
    margin: 20px auto;
    padding: 20px;
    background: linear-gradient(135deg, #2a2414, #1a140a);
    border: 3px solid #c9b06a;
    border-radius: 16px;
    box-shadow: 0 0 25px rgba(255,200,120,0.25);
    animation: fadeIn 0.7s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.box h2 {
    font-size: 28px;
    margin-bottom: 10px;
    color: #f5e4b0;
    text-shadow: 0 0 10px rgba(255,200,120,0.4);
}

.box p {
    font-size: 18px;
    color: #d8c89a;
    line-height: 1.7;
}

.box img, .box video {
    width: 100%;
    margin-top: 15px;
    border-radius: 12px;
    border: 2px solid #c9b06a;
    box-shadow: 0 0 15px rgba(255,200,120,0.3);
}
</style>
</head>

<body>

<h1 style="text-align:center; font-size:42px; margin-top:20px; text-shadow:0 0 20px rgba(255,200,120,0.5);">
اتچمنت‌ها ⚔️
</h1>

<div id="att-container"></div>

<script>
fetch("attachments-data.txt")
    .then(res => res.text())
    .then(data => {
        let html = "";
        data.split("\n").forEach(line => {
            if (line.trim() !== "") {
                let p = line.split("|");

                html += `
                    <div class="box">
                        <h2>${p[0]}</h2>
                        ${p[1] !== "none" ? `<p>${p[1]}</p>` : ""}
                        ${p[2] !== "none" ? `<img src="${p[2]}">` : ""}
                        ${p[3] !== "none" ? `<video controls><source src="${p[3]}"></video>` : ""}
                    </div>
                `;
            }
        });
        document.getElementById("att-container").innerHTML = html;
    });
</script>

</body>
</html>
